<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momentum</title>
    <link rel="stylesheet" href="style.css">
</head>

<body style="background-color: black; color: white;">
    <div id="canvas-box">

        <div class="heading-text">
            <p style="padding: 0px; margin: 0px;">&#128221; Momentum | Your To Do App</p>
        </div>

        <div id="input-div">
            <form id="user-input-field">
                <input type="text" id="user-input" placeholder="Enter a task...">

                <button type="submit" id="input-button">
                    Add Task
                </button>
            </form>
        </div>

        <div id="task-list">
            <ul id="task-list-tree"></ul>
        </div>

        <div id="bottom-div">
            <div id="task-info">
                <p>
                    Total Tasks:
                    <span id="totalTasks">0</span>
                </p>

                <p>
                    Tasks Done:
                    <span id="completedTasks">0</span>
                </p>
            </div>

            <div id="reset-btn-div">
                <button id="reset-button">Clear All</button>
            </div>

        </div>

    </div>
</body>
<script src="script.js"></script>

</html>
