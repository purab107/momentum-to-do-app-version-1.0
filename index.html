<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momentum</title>
    <link rel="stylesheet" href="style.css">
</head>

<body style="background-color: black; color: white;">
    <div id="canvas-box">

        <div class="heading-text">
            <p>Momentum</p>
            <p>Your Personal To Do App</p>
        </div>

        <form id="user-input-field">
            <input type="text" id="user-input" placeholder="Enter a task...">

            <button type="submit" id="input-button">
                Add Task
            </button>
        </form>

        <div id="task-list" style="max-height: 240px; overflow-y: auto;">

            <h2>Task List</h2>

            <ul id="task-list-tree" style="margin: 0; list-style: none;"></ul>

        </div>

        <div id="task-info">
            <p>
                Total Tasks:
                <span id="totalTasks">0</span>
            </p>

            <p>
                Tasks Done:
                <span id="completedTasks">0</span>
            </p>
        </div>

        <div>
            <button id="reset-button">Reset To Do List</button>
        </div>

    </div>
</body>
<script src="script.js"></script>

</html>
